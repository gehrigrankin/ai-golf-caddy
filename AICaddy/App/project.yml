# Xcode project definition — regenerate the .xcodeproj any time with:
#   xcodegen generate   (run from this App/ directory)
#
# This lives in App/ (not next to Package.swift) on purpose: xcodebuild
# prefers a project over a package, and the test suite runs against the
# package one level up:
#   cd .. && xcodebuild test -scheme AICaddy -destination 'platform=iOS Simulator,name=iPhone 16'
name: AICaddyApp
options:
  bundleIdPrefix: com.gehrig
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  AICaddy:
    type: application
    platform: iOS
    sources:
      - path: ../AICaddy
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gehrig.aicaddy
        PRODUCT_NAME: AI Caddy
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # Merges the custom keys (location/mic/speech usage strings, API keys)
        # from the existing plist into the generated one.
        INFOPLIST_FILE: ../AICaddy/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: AI Caddy
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Set these to enable Claude-powered shot parsing / analysis and leave
        # them empty otherwise — the app falls back to fully-local parsing.
        ANTHROPIC_API_KEY: ""
